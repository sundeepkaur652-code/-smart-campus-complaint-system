<!DOCTYPE html>
<html>
<head>
    <title>Complaint Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>📢 Submit Complaint</h1>

    <form method="POST">

        <select name="type">

            <option>WiFi</option>
            <option>Electricity</option>
            <option>Hostel</option>
            <option>Classroom</option>
            <option>Other</option>

        </select>

        <br><br>

        <textarea
            name="description"
            rows="5"
            cols="40"
            placeholder="Describe your complaint"
            required></textarea>

        <br><br>

        <button type="submit">
            Submit Complaint
        </button>

    </form>

</div>

</body>
</html>
