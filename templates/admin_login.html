<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>👨‍💼 Admin Login</h1>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Admin Username"
               required>

        <br><br>

        <input type="password"
               name="password"
               placeholder="Admin Password"
               required>

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
